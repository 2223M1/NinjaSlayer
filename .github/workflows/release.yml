name: GitHub Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v0.1.x tag to rebuild or repair
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: [self-hosted, Windows, X64, ninjaslayer-release]
    environment: release-production
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout complete history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Validate release tag and ancestry
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v0\.1\.(0|[1-9][0-9]?)$') {
            throw "Release tags must use v0.1.x, where x is 0 through 99 without leading zeroes."
          }
          git show-ref --verify --quiet "refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) { throw "Release tag $env:RELEASE_TAG does not exist." }
          $releaseSha = (git rev-list -n 1 $env:RELEASE_TAG).Trim().ToLowerInvariant()
          if ((git rev-parse HEAD).Trim().ToLowerInvariant() -ne $releaseSha) {
            throw 'The checked-out commit does not match the release tag.'
          }
          git fetch origin main --no-tags
          git merge-base --is-ancestor $releaseSha origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "The release tag commit is not on origin/main."
          }
          "RELEASE_SHA=$releaseSha" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Require a successful protected game contract
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\.github\scripts\verify-contract-attestation.ps1 `
            -CandidateSha $env:RELEASE_SHA `
            -Repository '${{ github.repository }}' `
            -Token $env:GH_TOKEN `
            -OutputDirectory (Join-Path $env:RUNNER_TEMP 'contract-attestation')

      - name: Setup .NET 9
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 9.0.x

      - name: Validate isolated release inputs
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:STS2_DATA_DIR)) {
            throw 'The ephemeral release runner did not provide STS2_DATA_DIR.'
          }
          if ([string]::IsNullOrWhiteSpace($env:GODOT_EXE) -or -not (Test-Path -LiteralPath $env:GODOT_EXE -PathType Leaf)) {
            throw 'The ephemeral release runner did not provide a valid GODOT_EXE.'
          }
          if ([string]::IsNullOrWhiteSpace($env:NINJASLAYER_SPINE_DIR)) {
            throw 'The ephemeral release runner did not provide NINJASLAYER_SPINE_DIR.'
          }
          $workspace = [IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          foreach ($fileName in @('sts2.dll', '0Harmony.dll', 'GodotSharp.dll')) {
            $file = Get-Item -LiteralPath (Join-Path $env:STS2_DATA_DIR $fileName) -ErrorAction Stop
            if (-not $file.IsReadOnly) { throw "$fileName must be mounted read-only by the ephemeral runner." }
            if ($file.FullName.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
              throw "$fileName must remain outside the repository workspace."
            }
          }

      - name: Install verified Spine extension
        shell: powershell
        run: |
          $expectedHash = '854D827B8926B00BA6459093033BF0C0898EFA2B6E1C85EB0ABC78CA153EA58C'
          $workspace = [IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          $destination = Join-Path $env:GITHUB_WORKSPACE 'addons\spine\windows'
          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          foreach ($fileName in @(
            'libspine_godot.windows.editor.x86_64.dll',
            'libspine_godot.windows.template_debug.x86_64.dll',
            'libspine_godot.windows.template_release.x86_64.dll'
          )) {
            $source = Join-Path $env:NINJASLAYER_SPINE_DIR $fileName
            $file = Get-Item -LiteralPath $source -ErrorAction Stop
            if (-not $file.IsReadOnly) { throw "$fileName must be mounted read-only by the ephemeral runner." }
            if ($file.FullName.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
              throw "$fileName must remain outside the repository workspace."
            }
            $actualHash = (Get-FileHash -LiteralPath $source -Algorithm SHA256).Hash
            if ($actualHash -ne $expectedHash) {
              throw "Spine extension hash mismatch for $fileName."
            }
            Copy-Item -LiteralPath $source -Destination $destination
          }

      - name: Validate resources and Spine extension
        shell: pwsh
        run: |
          node .\tools\validate-repository.mjs
          if (-not (Test-Path '.\addons\spine\windows\libspine_godot.windows.editor.x86_64.dll')) {
            throw 'The Godot 4.5.1 Spine GDExtension is missing.'
          }
          & $env:GODOT_EXE --headless --editor --quit --path . --import
          if ($LASTEXITCODE -ne 0) { throw 'Godot resource import failed.' }

      - name: Package release
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          dotnet msbuild .\NinjaSlayer.csproj -t:PackageMod `
            -p:Configuration=Release `
            -p:NinjaSlayerVersion=$version `
            -p:Sts2DataDir="$env:STS2_DATA_DIR" `
            -p:GodotExe="$env:GODOT_EXE"
          if ($LASTEXITCODE -ne 0) { throw 'PackageMod failed.' }
          $archive = "NinjaSlayer-$env:RELEASE_TAG.zip"
          Compress-Archive -Path '.\build\mods\NinjaSlayer\*' -DestinationPath $archive -Force
          "RELEASE_ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $env:RELEASE_ARCHIVE --clobber
          }
          else {
            gh release create $env:RELEASE_TAG $env:RELEASE_ARCHIVE `
              --verify-tag --notes-file '.\Workshop\change-note.md' --title "NinjaSlayer $env:RELEASE_TAG"
          }
          if ($LASTEXITCODE -ne 0) { throw 'Creating or updating the GitHub Release failed.' }
