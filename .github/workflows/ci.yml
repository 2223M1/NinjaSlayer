name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Infrastructure/telemetry-worker/package-lock.json

      - name: Repository consistency
        run: node tools/validate-repository.mjs

      - name: Pure logic tests
        run: dotnet test Tests/NinjaSlayer.LogicTests/NinjaSlayer.LogicTests.csproj -c Release -v:minimal

      - name: Roslyn architecture tests
        run: dotnet test Tests/NinjaSlayer.ArchitectureTests/NinjaSlayer.ArchitectureTests.csproj -c Release -v:minimal

      - name: RefLib compatibility compile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sts2-empty"
          dotnet restore NinjaSlayer.csproj \
            -p:UseSts2RefLib=true \
            -p:Sts2DataDir="$RUNNER_TEMP/sts2-empty"
          dotnet build NinjaSlayer.csproj --no-restore -v:minimal \
            -p:UseSts2RefLib=true \
            -p:Sts2DataDir="$RUNNER_TEMP/sts2-empty"

      - name: Build delivery boundaries
        run: node tools/test-build-boundaries.mjs

      - name: Worker install and tests
        working-directory: Infrastructure/telemetry-worker
        run: |
          npm ci
          npm test
          npm audit --omit=dev
          npx wrangler deploy --dry-run
