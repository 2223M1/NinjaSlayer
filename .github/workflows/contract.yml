name: Protected game contract

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Reviewed full SHA already present on canonical main
        required: true
        type: string

permissions:
  contents: read

jobs:
  contract:
    runs-on: [self-hosted, Windows, X64, ninjaslayer-contract]
    environment: game-contract
    timeout-minutes: 30
    steps:
      - name: Checkout trusted harness from protected main
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: main
          fetch-depth: 0
          path: trusted
          persist-credentials: false

      - name: Validate canonical candidate
        id: candidate
        shell: powershell
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          if ($env:CANDIDATE_SHA -notmatch '^[0-9a-fA-F]{40}$') { throw 'candidate_sha must be a full SHA.' }
          git -C trusted remote set-url origin "https://github.com/${{ github.repository }}.git"
          git -C trusted fetch origin main --no-tags
          git -C trusted cat-file -e "$env:CANDIDATE_SHA^{commit}"
          if ($LASTEXITCODE -ne 0) { throw 'Candidate commit is not present in the canonical repository.' }
          git -C trusted merge-base --is-ancestor $env:CANDIDATE_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw 'Candidate must already be an ancestor of canonical main.' }
          "sha=$($env:CANDIDATE_SHA.ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Checkout candidate sources without credentials
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: ${{ steps.candidate.outputs.sha }}
          fetch-depth: 1
          path: candidate
          persist-credentials: false

      - name: Setup .NET 9
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 9.0.x

      - name: Validate isolated runner inputs
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:STS2_DATA_DIR)) {
            throw 'The ephemeral runner did not provide STS2_DATA_DIR.'
          }
          if ([string]::IsNullOrWhiteSpace($env:GODOT_EXE) -or -not (Test-Path -LiteralPath $env:GODOT_EXE -PathType Leaf)) {
            throw 'The ephemeral runner did not provide a valid GODOT_EXE.'
          }
          if ([string]::IsNullOrWhiteSpace($env:NINJASLAYER_CONTRACT_DOTNET_ROOT)) {
            throw 'The ephemeral runner did not provide an isolated .NET 9 runtime.'
          }
          $contractRuntimes = @(Get-ChildItem (Join-Path $env:NINJASLAYER_CONTRACT_DOTNET_ROOT 'shared\Microsoft.NETCore.App') -Directory)
          $contractHostFxrs = @(Get-ChildItem (Join-Path $env:NINJASLAYER_CONTRACT_DOTNET_ROOT 'host\fxr') -Directory)
          if ($contractRuntimes.Count -ne 1 -or $contractRuntimes[0].Name -notmatch '^9\.' -or
              $contractHostFxrs.Count -ne 1 -or $contractHostFxrs[0].Name -notmatch '^9\.') {
            throw 'The isolated Contract runtime must contain only one .NET 9 runtime and hostfxr.'
          }
          $workspace = [IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          $referenceDirectory = [IO.Path]::GetFullPath($env:STS2_DATA_DIR)
          $contractDotnetRoot = [IO.Path]::GetFullPath($env:NINJASLAYER_CONTRACT_DOTNET_ROOT)
          if ($referenceDirectory.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
            throw 'Private references must be mounted outside the repository workspace.'
          }
          if ($contractDotnetRoot.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
            throw 'The isolated .NET runtime must be mounted outside the repository workspace.'
          }
          foreach ($fileName in @('sts2.dll', '0Harmony.dll', 'GodotSharp.dll')) {
            $file = Get-Item -LiteralPath (Join-Path $referenceDirectory $fileName) -ErrorAction Stop
            if (-not $file.IsReadOnly) {
              throw "$fileName must be mounted read-only by the ephemeral runner."
            }
          }
          "NUGET_PACKAGES=$env:RUNNER_TEMP\private-contract-nuget" | Out-File $env:GITHUB_ENV -Append

      - name: Restore trusted projects before isolation
        shell: powershell
        run: |
          dotnet restore trusted/tools/private-contract/NinjaSlayer.PrivateBuild.csproj `
            -p:CandidateRoot="$env:GITHUB_WORKSPACE\candidate" `
            -p:Sts2DataDir="$env:STS2_DATA_DIR"
          dotnet restore trusted/Tests/NinjaSlayer.RitsuLibContractTests/NinjaSlayer.RitsuLibContractTests.csproj `
            -p:Sts2DataDir="$env:STS2_DATA_DIR"

      - name: Compile candidate and run trusted contracts without network
        shell: powershell
        run: |
          $dotnet = (Get-Command dotnet).Source
          $rule = "NinjaSlayer-Contract-$env:GITHUB_RUN_ID"
          try {
            New-NetFirewallRule -DisplayName $rule -Direction Outbound -Action Block -Program $dotnet | Out-Null
            $env:HTTP_PROXY = 'http://127.0.0.1:9'
            $env:HTTPS_PROXY = 'http://127.0.0.1:9'
            dotnet build trusted/tools/private-contract/NinjaSlayer.PrivateBuild.csproj --no-restore -v:minimal `
              -p:CandidateRoot="$env:GITHUB_WORKSPACE\candidate" `
              -p:Sts2DataDir="$env:STS2_DATA_DIR" `
              -p:BaseOutputPath="$env:RUNNER_TEMP\private-contract-output\"
            if ($LASTEXITCODE -ne 0) { throw 'Sanitized candidate compile failed.' }
            dotnet build trusted/Tests/NinjaSlayer.RitsuLibContractTests/NinjaSlayer.RitsuLibContractTests.csproj `
              --no-restore -c Debug -v:minimal -p:Sts2DataDir="$env:STS2_DATA_DIR"
            if ($LASTEXITCODE -ne 0) { throw 'RitsuLib contract runner failed to build.' }
            $previousDotnetRoot = $env:DOTNET_ROOT
            try {
              $env:DOTNET_ROOT = $env:NINJASLAYER_CONTRACT_DOTNET_ROOT
              & $env:GODOT_EXE --headless --path trusted/Tests/NinjaSlayer.RitsuLibContractTests
              if ($LASTEXITCODE -ne 0) { throw 'RitsuLib contract runner failed.' }
            }
            finally {
              $env:DOTNET_ROOT = $previousDotnetRoot
            }
          }
          finally {
            Remove-NetFirewallRule -DisplayName $rule -ErrorAction SilentlyContinue
          }

      - name: Create allowlisted contract attestation
        shell: powershell
        run: |
          $gameName = [Reflection.AssemblyName]::GetAssemblyName((Join-Path $env:STS2_DATA_DIR 'sts2.dll'))
          $attestation = [ordered]@{
            schemaVersion = 1
            candidateSha = '${{ steps.candidate.outputs.sha }}'
            repository = '${{ github.repository }}'
            gameAssemblyVersion = $gameName.Version.ToString()
            ritsuLibVersion = '0.4.62'
            result = 'passed'
            runId = '${{ github.run_id }}'
          }
          $directory = Join-Path $env:RUNNER_TEMP 'contract-attestation'
          New-Item -ItemType Directory -Path $directory -Force | Out-Null
          $attestation | ConvertTo-Json | Set-Content (Join-Path $directory 'attestation.json') -Encoding utf8

      - name: Upload text-only attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: private-contract-${{ steps.candidate.outputs.sha }}
          path: ${{ runner.temp }}/contract-attestation/attestation.json
          if-no-files-found: error
          retention-days: 30

      - name: Scrub private inputs and caches
        if: always()
        shell: powershell
        run: |
          Remove-Item "$env:RUNNER_TEMP\private-contract-*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item candidate -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item trusted -Recurse -Force -ErrorAction SilentlyContinue
